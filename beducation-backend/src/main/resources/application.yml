# ================================================================
# BeDucation Platform — Configuración de la Aplicación (Spring Boot)
# ================================================================
# Este archivo contiene la configuración principal del backend.
# Para entornos distintos (staging, producción) se usan perfiles:
#   application-staging.yml, application-prod.yml
# ================================================================

spring:
  application:
    name: beducation-backend

  # ──────────────────────────────────────────────────────────────
  # BASE DE DATOS — MySQL
  # Crea la base de datos "beducation" antes de arrancar.
  # Comando MySQL: CREATE DATABASE beducation CHARACTER SET utf8mb4;
  # ──────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/beducation?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # ──────────────────────────────────────────────────────────────
  # JPA / HIBERNATE
  # validate: Hibernate valida el esquema contra las migraciones Flyway
  # ──────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        default_batch_fetch_size: 20

  # ──────────────────────────────────────────────────────────────
  # FLYWAY — Migraciones de base de datos
  # Los scripts SQL están en: src/main/resources/db/migration/
  # Nomenclatura: V1__descripcion.sql, V2__descripcion.sql, ...
  # ──────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ──────────────────────────────────────────────────────────────
  # SEGURIDAD — Auth0 como proveedor de identidad
  # El backend es un "Resource Server" que valida tokens JWT
  # emitidos por Auth0. Configurar con vuestros valores de Auth0.
  # ──────────────────────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:https://YOUR-TENANT.auth0.com/}
          jwk-set-uri: ${AUTH0_ISSUER_URI:https://YOUR-TENANT.auth0.com/}.well-known/jwks.json

  # ──────────────────────────────────────────────────────────────
  # EMAIL — AWS SES (Simple Email Service)
  # Configurar en variables de entorno para producción
  # ──────────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:email-smtp.eu-west-1.amazonaws.com}
    port: 587
    username: ${MAIL_USERNAME:your-ses-smtp-username}
    password: ${MAIL_PASSWORD:your-ses-smtp-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Carga de ficheros (CV, documentos)
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

# ──────────────────────────────────────────────────────────────
# SERVIDOR
# ──────────────────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /api

# ──────────────────────────────────────────────────────────────
# AWS S3 — Almacenamiento de ficheros
# Documentos de estudiantes (CV, foto) y logos de empresas
# ──────────────────────────────────────────────────────────────
aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET:beducation-files}
    region: ${AWS_REGION:eu-west-1}
  access-key: ${AWS_ACCESS_KEY:your-access-key}
  secret-key: ${AWS_SECRET_KEY:your-secret-key}

# ──────────────────────────────────────────────────────────────
# EMAIL — Remitente oficial
# ──────────────────────────────────────────────────────────────
app:
  email:
    from: ${APP_EMAIL_FROM:noreply@beducation.com}
    from-name: "BeDucation Platform"
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  auth0:
    audience: ${AUTH0_AUDIENCE:https://api.beducation.com}

# ──────────────────────────────────────────────────────────────
# SPRINGDOC — Swagger UI
# Accesible en: http://localhost:8080/api/swagger-ui.html
# ──────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    oauth:
      client-id: ${AUTH0_CLIENT_ID:your-client-id}

# ──────────────────────────────────────────────────────────────
# ACTUATOR — Monitoreo de salud
# ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ──────────────────────────────────────────────────────────────
# LOGGING
# ──────────────────────────────────────────────────────────────
logging:
  level:
    com.beducation: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
