# ============================================================
# CONFIGURACIÓN DE BEDUCATION BACKEND
# ============================================================

spring:
  application:
    name: beducation-backend

  # CONFIGURACIÓN DE BASE DE DATOS (SQL Server)
  datasource:
    # NOTA: En producción, usar variables de entorno para URL, username y password
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=beducation;encrypt=false;trustServerCertificate=true;}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:BeducationPass123!}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # CONFIGURACIÓN DE JPA / HIBERNATE
  jpa:
    hibernate:
      # ADVERTENCIA: En producción cambiar a 'validate' o 'none' para evitar cambios accidentales
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
        default_batch_fetch_size: 20

  # MIGRACIONES DE BASE DE DATOS
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  # SEGURIDAD: Integración con Auth0 (OIDC / JWT)
  security:
    oauth2:
      resourceserver:
        jwt:
          # Debe coincidir con el Dominio de Auth0
          issuer-uri: ${AUTH0_ISSUER_URI:https://dev-placeholder.auth0.com/}
          jwk-set-uri: ${AUTH0_JWK_SET_URI:https://dev-placeholder.auth0.com/.well-known/jwks.json}

  # CONFIGURACIÓN DE CORREO (AWS SES)
  mail:
    host: ${MAIL_HOST:email-smtp.eu-west-1.amazonaws.com}
    port: 587
    username: ${MAIL_USERNAME:your-ses-smtp-username}
    password: ${MAIL_PASSWORD:your-ses-smtp-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # LÍMITES DE SUBIDA DE ARCHIVOS
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

# CONFIGURACIÓN DE AWS (S3 para almacenamiento de documentos)
aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET:beducation-files}
    region: ${AWS_REGION:eu-west-1}
  access-key: ${AWS_ACCESS_KEY:your-access-key}
  secret-key: ${AWS_SECRET_KEY:your-secret-key}

# PARÁMETROS ESPECÍFICOS DE LA APLICACIÓN
app:
  email:
    from: ${APP_EMAIL_FROM:noreply@beducation.com}
    from-name: "BeDucation Platform"
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  auth0:
    audience: ${AUTH0_AUDIENCE:https://api.beducation.com}
  
  # Configuración para JWT locales (usado en flujo de Invitados/Debug)
  jwt:
    secret: ${JWT_SECRET:beducation-local-secret-key-32-chars-minimum-length}
    expiration: ${JWT_EXPIRATION_MS:86400000} # 24 horas

# DOCUMENTACIÓN API (Swagger)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    oauth:
      client-id: ${AUTH0_CLIENT_ID:your-client-id}

# MONITOREO Y ACTUATOR
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# NIVELES DE LOGGING
logging:
  level:
    com.beducation: ${LOGGING_LEVEL_APP:DEBUG}
    org.springframework.security: INFO
    org.hibernate.SQL: INFO