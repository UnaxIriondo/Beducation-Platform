spring:
  application:
    name: beducation-backend

  datasource:
    url: "jdbc:sqlserver://localhost:1433;databaseName=beducation;encrypt=false;trustServerCertificate=true;"
    username: sa
    password: BeducationPass123!
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-placeholder.auth0.com/
          jwk-set-uri: https://dev-placeholder.auth0.com/.well-known/jwks.json
  mail:
    host: ${MAIL_HOST:email-smtp.eu-west-1.amazonaws.com}
    port: 587
    username: ${MAIL_USERNAME:your-ses-smtp-username}
    password: ${MAIL_PASSWORD:your-ses-smtp-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: 8080
  servlet:
    context-path: /api

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET:beducation-files}
    region: ${AWS_REGION:eu-west-1}
  access-key: ${AWS_ACCESS_KEY:your-access-key}
  secret-key: ${AWS_SECRET_KEY:your-secret-key}

app:
  email:
    from: ${APP_EMAIL_FROM:noreply@beducation.com}
    from-name: "BeDucation Platform"
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  auth0:
    audience: ${AUTH0_AUDIENCE:https://api.beducation.com}
  jwt:
    secret: ${JWT_SECRET:beducation-local-secret-key-32-chars-minimum-length}
    expiration: ${JWT_EXPIRATION_MS:86400000} # 24 horas

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    oauth:
      client-id: ${AUTH0_CLIENT_ID:your-client-id}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.beducation: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO